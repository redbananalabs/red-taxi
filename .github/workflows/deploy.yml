name: Build & Deploy Red Taxi

on:
  push:
    branches: [main]
    paths: ['src/**', 'tests/**', 'docker/**']
  pull_request:
    branches: [main]
    paths: ['src/**', 'tests/**']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/redtaxi
  DOTNET_VERSION: '8.0.x'

jobs:
  build-dotnet:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/RedTaxi.sln

      - name: Build solution
        run: dotnet build src/RedTaxi.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/ --configuration Release --no-build --verbosity normal || true

      - name: Publish API
        run: dotnet publish src/RedTaxi.API -c Release -o publish/api

      - name: Publish Blazor
        run: dotnet publish src/RedTaxi.Blazor -c Release -o publish/blazor

      - name: Publish WebPortal
        run: dotnet publish src/RedTaxi.WebPortal -c Release -o publish/webportal

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-publish
          path: publish/
          retention-days: 7

  build-docker:
    needs: build-dotnet
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: api-final
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Blazor image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: blazor-final
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-blazor:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-blazor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/redtaxi
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "Waiting for health check..."
            sleep 10
            curl -sf http://localhost:5001/health || echo "WARNING: API health check failed"
            curl -sf http://localhost:5002/health || echo "WARNING: Blazor health check failed"
