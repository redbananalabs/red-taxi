version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/ssl/certs:ro
    depends_on:
      - redtaxi-api
    restart: unless-stopped

  redtaxi-api:
    image: ghcr.io/redbananalabs/redtaxi:latest
    # For local dev, replace with:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__PlatformConnection=Server=sqlserver;Database=RedTaxi_Platform;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true
      - ConnectionStrings__TenantTemplate=Server=sqlserver;Database=RedTaxi_{slug};User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=true
      - Redis__ConnectionString=redis:6379
      - Tenancy__Mode=PerTenantDatabase
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_PASSWORD}
    ports:
      - "1433:1433"  # Remove in production
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  sqldata:
  redisdata:
